<!DOCTYPE html>
<html>

<head lang="en">
    <title>Tapo Smart Plug Settings</title>
    <meta charset="utf-8" />
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            font-size: 13px;
            color: #d8d8d8;
            background: #2d2d2d;
            margin: 0;
            padding: 8px;
        }
        label {
            display: block;
            color: #969696;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin: 10px 0 3px;
        }
        input, select {
            width: 100%;
            box-sizing: border-box;
            background: #1a1a1a;
            border: 1px solid #4a4a4a;
            border-radius: 3px;
            color: #d8d8d8;
            padding: 5px 7px;
            font-size: 13px;
        }
        input:focus, select:focus { outline: none; border-color: #0078ff; }
        .section { color: #0078ff; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin: 14px 0 4px; }
    </style>
</head>

<body>
    <div class="section">Device</div>
    <label>IP Address</label>
    <input id="ip" type="text" placeholder="e.g. 192.168.1.123" />
    <label>Icon Style</label>
    <select id="iconStyle">
        <option value="power">⚡ Power Button</option>
        <option value="lamp">💡 Lamp</option>
    </select>

    <div class="section">Tapo Account (shared across all keys)</div>
    <label>Email</label>
    <input id="email" type="email" placeholder="your@email.com" />
    <label>Password</label>
    <input id="password" type="password" placeholder="••••••••" />

    <script>
        let ws, actionInfo, uuid;

        function connectElgatoStreamDeckSocket(port, pluginUUID, registerEvent, info, actionInfoStr) {
            uuid = pluginUUID;
            actionInfo = JSON.parse(actionInfoStr);

            ws = new WebSocket("ws://127.0.0.1:" + port);

            ws.onopen = () => {
                ws.send(JSON.stringify({ event: registerEvent, uuid }));
                ws.send(JSON.stringify({ event: "getSettings", context: uuid }));
                ws.send(JSON.stringify({ event: "getGlobalSettings", context: uuid }));
            };

            ws.onmessage = (evt) => {
                const msg = JSON.parse(evt.data);
                if (msg.event === "didReceiveSettings") {
                    const s = msg.payload.settings || {};
                    document.getElementById("ip").value = s.ip || "";
                    document.getElementById("iconStyle").value = s.iconStyle || "power";
                }
                if (msg.event === "didReceiveGlobalSettings") {
                    const s = msg.payload.settings || {};
                    document.getElementById("email").value = s.email || "";
                    document.getElementById("password").value = s.password || "";
                }
            };
        }

        function saveSettings() {
            const ip = document.getElementById("ip").value.trim();
            const iconStyle = document.getElementById("iconStyle").value;
            ws.send(JSON.stringify({
                event: "setSettings",
                context: uuid,
                payload: { ip, iconStyle }
            }));
        }

        function saveGlobalSettings() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            ws.send(JSON.stringify({
                event: "setGlobalSettings",
                context: uuid,
                payload: { email, password }
            }));
        }

        document.getElementById("ip").addEventListener("change", saveSettings);
        document.getElementById("iconStyle").addEventListener("change", saveSettings);
        document.getElementById("email").addEventListener("change", saveGlobalSettings);
        document.getElementById("password").addEventListener("change", saveGlobalSettings);
    </script>
</body>

</html>
